<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Toughjobs — Image Library</title>
<meta name="robots" content="index, follow" />
<meta name="author" content="Toughjobs" />
<meta name="publisher" content="ToughJobs Digital Marketing" />
<link rel="canonical" href="https://toughjobs.org/image-finder.html" />

<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0A0F1C;
    font-family: "Archivo", sans-serif;
    color: #fff;
    padding: 32px;
  }
  h1 {
    font-family: "Archivo Black", sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    margin: 0 0 4px;
    font-size: 32px;
  }
  .count { color: #9aa1ad; margin: 0 0 24px; font-size: 15px; }
  .search-wrap { max-width: 480px; margin-bottom: 32px; }
  #search {
    width: 100%;
    padding: 14px 18px;
    font-size: 16px;
    border-radius: 8px;
    border: 2px solid #282828;
    background: #14151a;
    color: #fff;
    font-family: "Archivo", sans-serif;
  }
  #search:focus { outline: none; border-color: #C8262A; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }
  .card {
    background: #14151a;
    border: 1px solid #282828;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .card:hover { border-color: #C8262A; transform: translateY(-2px); }
  .thumb {
    width: 100%;
    height: 150px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .thumb img, .thumb video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .meta { padding: 10px 12px; }
  .fname {
    font-size: 13px;
    font-weight: 700;
    word-break: break-all;
    line-height: 1.3;
  }
  .fpath { font-size: 11px; color: #9aa1ad; margin-top: 4px; word-break: break-all; }
  .delete-btn {
    display: block;
    width: 100%;
    padding: 8px 0;
    margin-top: 8px;
    background: #C8262A;
    border: none;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .delete-btn:hover { background: #A90100; }
  .empty { color: #9aa1ad; padding: 40px 0; text-align: center; font-size: 16px; }
  /* lightbox */
  .lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,15,28,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 40px;
  }
  .lightbox.open { display: flex; }
  .lightbox img, .lightbox video { max-width: 90vw; max-height: 75vh; object-fit: contain; }
  .lightbox .lb-name { font-size: 15px; color: #fff; text-align: center; }
  .lightbox .lb-close {
    position: absolute; top: 24px; right: 32px;
    background: none; border: none; color: #fff; font-size: 28px; cursor: pointer;
  }
  .lightbox .lb-path {
    background: #14151a; border: 1px solid #282828; border-radius: 6px;
    padding: 8px 14px; font-size: 13px; color: #ccc;
  }
</style>
</head>
<body>

<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
  <div>
    <h1>Image Library</h1>
    <p class="count" id="count" style="margin: 0;"></p>
  </div>
  <button id="closeBtn" style="background: #C8262A; border: none; color: #fff; padding: 12px 20px; border-radius: 6px; font-weight: 700; text-transform: uppercase; font-size: 13px; cursor: pointer; font-family: Archivo, sans-serif; letter-spacing: 0.06em;">Close</button>
</div>

<div class="search-wrap" style="display:flex;gap:12px;align-items:center;max-width:none;">
  <input id="search" type="text" placeholder="Search filenames (e.g. electrician, wrap, roofing)…" autocomplete="off" style="flex:1;max-width:480px;" />
  <button id="addBtn" style="background:#C8262A;border:none;color:#fff;padding:14px 20px;border-radius:8px;font-weight:700;text-transform:uppercase;font-size:13px;cursor:pointer;font-family:Archivo,sans-serif;letter-spacing:0.06em;white-space:nowrap;">+ Add Image(s)</button>
  <input id="fileInput" type="file" accept="image/*,video/*" multiple style="display:none;" />
</div>

<div class="grid" id="grid"></div>
<p class="empty" id="empty" style="display:none;">No files match your search.</p>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">&times;</button>
  <div id="lbMedia"></div>
  <div class="lb-name" id="lbName"></div>
  <div class="lb-path" id="lbPath"></div>
</div>

<script>
// Manifest of asset files — regenerate this list if assets/ changes.
const FILES = [
"accessibility-logo.png","architectural-drawing-transparent.webp","audio-visualizer.mp4",
"blueprint-background.webp","blueprint-bg-darker.webp","blueprint-master.webp","chainsaw-guy.webp",
"construction-workers.mp4","customer-technician-conversation.webp","customer-technician.webp",
"electrician-hero.webp","engineering-schematics.jpg","erik-electrical-toughjobs.webp",
"forest-background-green.webp","girl-saw.webp","google-profile-optimization.webp",
"google-search-plummers.webp","home-services-pop-art-2.webp","insight-before-after.webp",
"insight-load-time-chart.webp","local-prominence.webp","messy-tech.webp","partnership-schematics.webp",
"plumbing.webp","pools.webp","powerline-electrician-bg.webp","powerline-electrician.webp",
"primer-page-appliance-repair-1.webp","primer-page-auto-detailing-1.webp","primer-page-auto-repair-1.webp",
"primer-page-carpet-cleaning-1.webp","primer-page-concrete-paving-1.webp","primer-page-electricians-1.webp",
"primer-page-excavation-1.webp","primer-page-fencing-1.webp","primer-page-framing-drywall-1.webp",
"primer-page-garage-doors-1.webp","primer-page-general-contractors-1.webp","primer-page-handyman-1.webp",
"primer-page-hvac-1.webp","primer-page-janitorial-1.webp","primer-page-junk-removal-1.webp",
"primer-page-landscaping-1.webp","primer-page-locksmiths-1.webp","primer-page-masonry-1.webp",
"primer-page-pest-control-1.webp","primer-page-plumbing-1.webp","primer-page-pools-1.webp",
"primer-page-pressure-washing-1.webp","primer-page-restoration-1.webp","primer-page-roofing-1.webp",
"primer-page-solar-1.webp","primer-page-towing-1.webp","primer-page-tree-service-1.webp",
"seo-hero.webp","sitelite-code.webp","social-media-hero.webp","speed-gauge.webp",
"toughjobs-helping-hands.webp","toughjobs-logo-2026.webp","toughjobs-monogram-logo.webp",
"toughjobs-monogram.webm","trade-hero-appliance-repair.webp","trade-hero-auto-detailing.png",
"trade-hero-auto-detailing.webp","trade-hero-auto-repair.webp","trade-hero-carpet-cleaning.webp",
"trade-hero-concrete-paving.webp","trade-hero-electricians.webp","trade-hero-excavation.webp",
"trade-hero-fencing.webp","trade-hero-framing-drywall.webp","trade-hero-general-contractors.webp",
"trade-hero-handyman.webp","trade-hero-hvac.webp","trade-hero-janitorial.webp",
"trade-hero-junk-removal.webp","trade-hero-landscaping.webp","trade-hero-locksmiths.webp",
"trade-hero-masonry.webp","trade-hero-painters.webp","trade-hero-pest-control.webp",
"trade-hero-plumbing.webp","trade-hero-pools.webp","trade-hero-pressure-washing.webp",
"trade-hero-restoration.webp","trade-hero-roofing.webp","trade-hero-solar.webp",
"trade-hero-towing.webp","trade-hero-tree-service.webp","website-speed-improtance.webp",
"white-engineering-background.webp","woman-drill-philosophy.webp","woman-drill.webp",
"woman-jackhammer-transparent.webp","woman-mower.webp","woman-trowel-fullbody.webp",
"wrap-sedan-herbert.webp","wrap-trailer-guacnroll.webp","wrap-truck-erik.webp","wrench-worker-hero.webp"
].map(f => "assets/" + f).concat([
"appliance-repair.webp","auto-detailing.webp","auto-repair.webp","carpet-cleaning.webp",
"concrete-paving.webp","electricians.webp","excavation.webp","fencing.webp","framing-drywall.webp",
"general-contractors.webp","handyman.webp","hvac.webp","janitorial.webp","junk-removal.webp",
"landscaping.webp","locksmiths.webp","masonry.webp","painters.webp","pest-control.webp",
"plumbing.webp","pools.webp","pressure-washing.webp","restoration.webp","roofing.webp",
"solar.webp","towing.webp","tree-service.webp"
].map(f => "trade-images/" + f));

const isVideo = f => /\.(mp4|webm)$/i.test(f);
const URL_OVERRIDES = {};
const resolveSrc = f => URL_OVERRIDES[f] || f;

const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const countEl = document.getElementById('count');
const search = document.getElementById('search');
const lightbox = document.getElementById('lightbox');
const lbMedia = document.getElementById('lbMedia');
const lbName = document.getElementById('lbName');
const lbPath = document.getElementById('lbPath');

function render(list) {
  grid.innerHTML = '';
  empty.style.display = list.length ? 'none' : 'block';
  countEl.textContent = list.length + ' of ' + FILES.length + ' files';
  list.forEach(path => {
    const name = path.split('/').pop();
    const card = document.createElement('div');
    card.className = 'card';
    const src = resolveSrc(path);
    const media = isVideo(path)
      ? `<video src="${src}" muted></video>`
      : `<img src="${src}" loading="lazy" alt="${name}" />`;
    card.innerHTML = `
      <div class="thumb">${media}</div>
      <div class="meta">
        <div class="fname">${name}</div>
        <div class="fpath">${path}</div>
        <button class="delete-btn" data-path="${path}">Delete</button>
      </div>`;
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-btn')) return;
      openLightbox(path, name);
    });
    card.querySelector('.delete-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      if (confirm(`Delete ${name}?\n\nThis cannot be undone.`)) {
        deleteImage(path);
      }
    });
    grid.appendChild(card);
  });
}

function openLightbox(path, name) {
  const src = resolveSrc(path);
  lbMedia.innerHTML = isVideo(path)
    ? `<video src="${src}" controls autoplay></video>`
    : `<img src="${src}" alt="${name}" />`;
  lbName.textContent = name;
  lbPath.textContent = path;
  lightbox.classList.add('open');
}
document.getElementById('lbClose').addEventListener('click', () => {
  lightbox.classList.remove('open');
  lbMedia.innerHTML = '';
});
lightbox.addEventListener('click', e => {
  if (e.target === lightbox) {
    lightbox.classList.remove('open');
    lbMedia.innerHTML = '';
  }
});

function deleteImage(path) {
  const idx = FILES.indexOf(path);
  if (idx > -1) {
    FILES.splice(idx, 1);
    const q = search.value.trim().toLowerCase();
    const filtered = q ? FILES.filter(f => f.toLowerCase().includes(q)) : FILES;
    render(filtered);
  }
}

search.addEventListener('input', () => {
  const q = search.value.trim().toLowerCase();
  const filtered = q ? FILES.filter(f => f.toLowerCase().includes(q)) : FILES;
  render(filtered);
});

render(FILES);

const addBtn = document.getElementById('addBtn');
const fileInput = document.getElementById('fileInput');
addBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  const files = Array.from(fileInput.files || []);
  files.forEach(file => {
    const url = URL.createObjectURL(file);
    const path = 'uploads/' + file.name;
    FILES.unshift(path);
    URL_OVERRIDES[path] = url;
  });
  fileInput.value = '';
  const q = search.value.trim().toLowerCase();
  const filtered = q ? FILES.filter(f => f.toLowerCase().includes(q)) : FILES;
  render(filtered);
});

document.getElementById('closeBtn').addEventListener('click', () => {
  // If embedded in the slide-out modal, tell the parent to close it
  if (window.parent !== window) {
    window.parent.postMessage('close-image-finder', '*');
    return;
  }
  if (document.referrer) {
    window.location.href = document.referrer;
  } else if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = 'index.html';
  }
});

</script>

</body>
</html>

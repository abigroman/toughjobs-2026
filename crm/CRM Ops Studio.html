<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Toughjobs CRM &amp; Ops Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&amp;family=Archivo:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet" />
<style>
:root {
  --accent: #C8262A;
  --ink: #0A0F1C;
  --navy: #002768;
  --bg: #F4F4F2;
  --card: #FFFFFF;
  --line: #E3E3DF;
  --text: #1A1F2C;
  --muted: #6B7280;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body { font-family: "Archivo", sans-serif; background: var(--bg); color: var(--text); }
a { color: var(--accent); }
a:hover { color: #A90100; }
button { font-family: inherit; }

.app { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: 224px; flex-shrink: 0; background: var(--ink); color: #fff;
  display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh;
}
.side-brand { padding: 22px 18px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.side-brand img { display: block; object-fit: contain; }
.side-brand-text { font-family: "Archivo Black", sans-serif; font-size: 12px; letter-spacing: 0.08em; line-height: 1.3; color: var(--accent); }
.side-nav { display: flex; flex-direction: column; gap: 2px; padding: 14px 10px; flex: 1; }
.side-link {
  display: flex; align-items: center; gap: 10px; padding: 11px 12px; border: 0; border-radius: 4px;
  background: transparent; color: rgba(255,255,255,0.75); font-weight: 700; font-size: 13px;
  text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; text-align: left;
}
.side-link:hover { color: #fff; background: rgba(255,255,255,0.06); }
.side-link.on { color: #fff; background: var(--accent); }
.side-icon { width: 16px; text-align: center; }
.side-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 11px; border-radius: 999px; padding: 2px 7px; }
.side-link.on .side-badge { background: #fff; color: var(--accent); }
.side-foot { padding: 16px 18px; border-top: 1px solid rgba(255,255,255,0.08); }
.side-foot-label { font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
.side-foot-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }

/* Main */
.main { flex: 1; padding: 32px 36px 60px; min-width: 0; }
.screen-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
.section-title { font-family: "Archivo Black", sans-serif; font-size: 30px; margin: 0; text-transform: uppercase; letter-spacing: -0.01em; color: var(--ink); }
.screen-sub { margin: 6px 0 0; color: var(--muted); font-size: 14px; }

.view-switch { display: flex; gap: 0; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: var(--card); }
.view-switch button {
  border: 0; background: transparent; padding: 9px 16px; font-weight: 700; font-size: 12px;
  text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); cursor: pointer;
}
.view-switch button.on { background: var(--ink); color: #fff; }

/* Pills / tags */
.pill { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; padding: 3px 9px; border: 1px solid; border-radius: 999px; white-space: nowrap; }
.pill-dot { width: 6px; height: 6px; border-radius: 50%; }
.trade-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; background: var(--navy); color: #fff; padding: 3px 8px; border-radius: 3px; }
.avatar { display: inline-flex; width: 26px; height: 26px; border-radius: 50%; background: var(--navy); color: #fff; font-size: 10px; font-weight: 800; align-items: center; justify-content: center; flex-shrink: 0; }

/* Kanban */
.kanban { display: grid; grid-template-columns: repeat(5, minmax(190px, 1fr)); gap: 14px; align-items: start; overflow-x: auto; }
.kanban-col { background: #ECECE8; border-radius: 8px; padding: 10px; }
.kanban-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 2px 4px 10px; }
.kanban-count { font-size: 12px; font-weight: 800; color: var(--muted); }
.kanban-cards { display: flex; flex-direction: column; gap: 8px; }
.kanban-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 18px 0; border: 1px dashed var(--line); border-radius: 6px; }

.client-card {
  display: block; width: 100%; text-align: left; background: var(--card); border: 1px solid var(--line);
  border-radius: 6px; padding: 12px; cursor: pointer; transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
}
.client-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(10,15,28,0.08); }
.cc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.cc-name { font-weight: 800; font-size: 14px; line-height: 1.25; color: var(--ink); }
.cc-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; align-items: center; }
.cc-stack { font-size: 11px; color: var(--muted); font-weight: 600; }
.cc-meta { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; font-weight: 700; color: var(--ink); }
.cc-meta em { font-style: normal; color: var(--muted); font-weight: 500; }
.cc-chk { color: var(--accent); }

/* Table */
.table-wrap { background: var(--card); border: 1px solid var(--line); border-radius: 8px; overflow: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); padding: 12px 14px; border-bottom: 1px solid var(--line); }
.data-table td { padding: 12px 14px; border-bottom: 1px solid var(--line); }
.data-table tbody tr { cursor: pointer; }
.data-table tbody tr:hover { background: #FAFAF8; }
.data-table tbody tr:last-child td { border-bottom: 0; }
.data-table.slim td { padding: 9px 10px; }
.data-table.slim tbody tr { cursor: default; }
.td-name { font-weight: 700; color: var(--ink); }
.mono { font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted); }

/* Detail */
.back-link { border: 0; background: none; color: var(--accent); font-weight: 700; font-size: 13px; cursor: pointer; padding: 0; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.04em; }
.back-link:hover { text-decoration: underline; }
.detail-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; margin-bottom: 22px; }
.detail-name { font-family: "Archivo Black", sans-serif; font-size: 28px; margin: 0; text-transform: uppercase; color: var(--ink); }
.detail-stats { display: flex; gap: 26px; }
.stat-num { font-family: "Archivo Black", sans-serif; font-size: 22px; color: var(--accent); }
.stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-top: 3px; font-weight: 600; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.panel { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 18px 20px; min-width: 0; }
.panel-wide { grid-column: 1 / -1; }
.panel-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 800; color: var(--ink); margin: 0 0 12px; }
.panel-title-row { display: flex; justify-content: space-between; align-items: baseline; }
.panel-count { font-weight: 800; color: var(--accent); font-size: 13px; }

.field-row { display: flex; gap: 14px; padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
.field-row:last-child { border-bottom: 0; }
.field-label { width: 170px; flex-shrink: 0; color: var(--muted); font-weight: 600; }
.field-value { font-weight: 600; color: var(--ink); }
.ai-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.ai-chip { font-size: 11px; font-weight: 700; background: rgba(200,38,42,0.08); color: var(--accent); border: 1px solid rgba(200,38,42,0.25); padding: 3px 8px; border-radius: 999px; }

.progress-track { height: 6px; background: var(--line); border-radius: 999px; overflow: hidden; margin: 4px 0 12px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.3s; }

.checklist { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; }
.chk { display: flex; gap: 10px; align-items: flex-start; padding: 7px 0; font-size: 13px; cursor: pointer; line-height: 1.4; }
.chk input { position: absolute; opacity: 0; }
.chk-box { width: 18px; height: 18px; flex-shrink: 0; border: 2px solid var(--line); border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; margin-top: 1px; transition: background 0.15s, border-color 0.15s; }
.chk.done .chk-box { background: var(--accent); border-color: var(--accent); }
.chk.done span:last-child { color: var(--muted); text-decoration: line-through; }
.chk:hover .chk-box { border-color: var(--accent); }

/* Tasks */
.task-card { background: var(--card); border: 1px solid var(--line); border-radius: 6px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.tc-name { font-weight: 700; font-size: 13px; line-height: 1.3; color: var(--ink); }
.tc-client { border: 0; background: none; padding: 0; text-align: left; color: var(--accent); font-weight: 700; font-size: 12px; cursor: pointer; }
.tc-client:hover { text-decoration: underline; }
.tc-foot { display: flex; align-items: center; gap: 10px; }
.tc-hours { margin-left: auto; }
.tc-status { font-family: inherit; font-size: 12px; font-weight: 600; padding: 6px 8px; border: 1px solid var(--line); border-radius: 5px; background: #FAFAF8; color: var(--text); cursor: pointer; }

/* Dashboards */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.stat-panel { padding: 16px 18px; }
.dash-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; width: 100%; padding: 10px 2px; border: 0; border-bottom: 1px solid var(--line); background: none; font-size: 13px; font-weight: 600; text-align: left; cursor: pointer; color: var(--text); }
.dash-row:last-child { border-bottom: 0; }
button.dash-row:hover .td-name { color: var(--accent); }

/* Automations */
.auto-badge { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--navy); background: rgba(0,39,104,0.08); border: 1px solid rgba(0,39,104,0.2); padding: 3px 8px; border-radius: 999px; }
.auto-trigger { font-size: 13px; color: var(--muted); margin: 0 0 8px; }
.alert-msg { border: 1px solid rgba(200,38,42,0.3); border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
.alert-head { background: rgba(200,38,42,0.08); color: var(--accent); font-weight: 800; font-size: 13px; padding: 10px 14px; }
.alert-body { padding: 12px 14px; font-size: 13px; line-height: 1.5; }
.alert-body p { margin: 8px 0 0; color: var(--muted); }
.sms-bubble { background: var(--ink); color: rgba(255,255,255,0.9); border-radius: 14px; border-bottom-left-radius: 4px; padding: 16px 18px; font-size: 13px; line-height: 1.6; margin-top: 12px; }
.sms-bubble strong { color: #fff; }
.muted { color: var(--muted); font-size: 13px; }

/* Density */
.density-compact .main { padding: 22px 24px 40px; }
.density-compact .panel { padding: 13px 15px; }
.density-compact .kanban { gap: 10px; }
.density-compact .client-card, .density-compact .task-card { padding: 9px; }
.density-compact .data-table td, .density-compact .data-table th { padding: 8px 11px; }
.density-compact .chk { padding: 4px 0; font-size: 12px; }
.density-compact .field-row { padding: 6px 0; }

@media (max-width: 1100px) {
  .detail-grid, .stat-grid { grid-template-columns: 1fr; }
  .kanban { grid-template-columns: repeat(5, 220px); }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</body>

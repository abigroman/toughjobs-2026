<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Toughjobs — AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --red:#C8262A; --red-d:#A90100; --navy:#002768; --ink:#0A0F1C;
    --white:#fff; --bg:#282828; --line:rgba(255,255,255,.12);
    --bot:#12182a; --bot-line:rgba(255,255,255,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{font-family:"Archivo",sans-serif;background:var(--ink);color:#fff;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  a{color:inherit;}

  /* HEADER */
  .abar{display:flex;align-items:center;gap:14px;padding:16px 22px;background:var(--ink);border-bottom:1px solid var(--line);flex-shrink:0;}
  .abar .avatar{width:44px;height:44px;border-radius:12px;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(200,38,42,.4);}
  .abar .avatar svg{width:24px;height:24px;stroke:#fff;}
  .abar .who b{font-family:"Archivo Black";font-size:16px;letter-spacing:.02em;text-transform:uppercase;display:block;line-height:1.1;}
  .abar .who span{font-size:12px;color:#8b93a7;display:flex;align-items:center;gap:6px;margin-top:3px;}
  .abar .who span::before{content:"";width:7px;height:7px;border-radius:50%;background:#3ad07a;box-shadow:0 0 0 3px rgba(58,208,122,.2);}
  .abar .call{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:2px;text-decoration:none;}
  .abar .call b{font-family:"Archivo Black";font-size:15px;color:#fff;}
  .abar .call small{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--red);font-weight:700;}
  @media(max-width:520px){.abar .call{display:none;}}

  .leave-fab{position:fixed;right:24px;bottom:24px;z-index:9998;display:flex;align-items:center;gap:12px;
    background:#12182a;border:1px solid var(--line);border-radius:14px;padding:10px 18px 10px 10px;
    box-shadow:0 12px 30px rgba(0,0,0,.45);text-decoration:none;cursor:pointer;white-space:nowrap;
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease;}
  .leave-fab:hover{transform:translateY(-3px);box-shadow:0 18px 38px rgba(0,0,0,.55);background:var(--red);}
  .leave-fab .lf-ic{width:38px;height:38px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .18s ease;}
  .leave-fab:hover .lf-ic{background:#fff;}
  .leave-fab .lf-ic svg{width:18px;height:18px;stroke:#fff;transition:stroke .18s ease;}
  .leave-fab:hover .lf-ic svg{stroke:var(--red);}
  .leave-fab .lf-txt b{display:block;font-family:"Archivo Black";color:#fff;font-size:12px;text-transform:uppercase;letter-spacing:.01em;line-height:1.2;}
  .leave-fab .lf-txt small{color:#9aa3b8;font-size:11px;font-weight:600;}
  @media(max-width:480px){.leave-fab .lf-txt{display:none;}.leave-fab{padding:10px;gap:0;}}

  /* CHAT SCROLL */
  .stream{flex:1;overflow-y:auto;padding:26px 0 12px;background:radial-gradient(120% 80% at 50% 0,#101728 0,var(--ink) 60%);}
  .stream-in{max-width:760px;margin:0 auto;padding:0 22px;display:flex;flex-direction:column;gap:18px;}
  .msg{display:flex;gap:12px;max-width:88%;}
  .msg .bub{padding:13px 17px;border-radius:16px;font-size:15px;line-height:1.55;}
  .msg.bot{align-self:flex-start;}
  .msg.bot .ic{width:32px;height:32px;border-radius:9px;background:var(--red);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;}
  .msg.bot .ic svg{width:17px;height:17px;stroke:#fff;}
  .msg.bot .bub{background:var(--bot);border:1px solid var(--bot-line);border-top-left-radius:5px;color:#e8ecf5;}
  .msg.bot .bub b{color:#fff;}
  .msg.bot .bub a{color:#ff8a8d;font-weight:600;text-decoration:none;border-bottom:1px solid rgba(255,138,141,.4);}
  .msg.me{align-self:flex-end;flex-direction:row-reverse;}
  .msg.me .bub{background:var(--red);color:#fff;border-top-right-radius:5px;font-weight:500;}

  .typing{display:flex;gap:5px;padding:4px 2px;}
  .typing i{width:7px;height:7px;border-radius:50%;background:#6b7488;animation:blink 1.2s infinite;}
  .typing i:nth-child(2){animation-delay:.2s;}
  .typing i:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}

  /* QUICK CHIPS */
  .chips{max-width:760px;margin:0 auto;padding:4px 22px 0;display:flex;flex-wrap:wrap;gap:9px;}
  .chip{font-family:"Archivo";font-size:13px;font-weight:600;color:#cfd5e4;background:#151c2e;border:1px solid var(--line);padding:9px 15px;border-radius:999px;cursor:pointer;transition:.15s;}
  .chip:hover{background:var(--red);border-color:var(--red);color:#fff;}

  /* COMPOSER */
  .composer{flex-shrink:0;background:var(--ink);border-top:1px solid var(--line);padding:14px 22px 18px;}
  .composer-in{max-width:760px;margin:0 auto;display:flex;gap:10px;align-items:flex-end;}
  .composer textarea{flex:1;resize:none;background:#151c2e;border:1px solid var(--line);border-radius:14px;color:#fff;font-family:"Archivo";font-size:15px;padding:14px 16px;line-height:1.4;max-height:120px;outline:none;}
  .composer textarea:focus{border-color:var(--red);}
  .composer textarea::placeholder{color:#6b7488;}
  .send{width:48px;height:48px;flex-shrink:0;border:none;border-radius:14px;background:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
  .send:hover{background:var(--red-d);}
  .send:disabled{opacity:.4;cursor:not-allowed;}
  .send svg{width:20px;height:20px;stroke:#fff;fill:none;}
  .disc{max-width:760px;margin:8px auto 0;padding-right:190px;text-align:center;font-size:11px;color:#616a7e;}
  @media(max-width:900px){.disc{padding-right:0;padding-bottom:60px;}}
  .disc a{color:#8b93a7;}
</style>
</head>
<body>

<header class="abar">
  <div class="avatar">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M12 2a5 5 0 015 5v1a5 5 0 01-10 0V7a5 5 0 015-5z"/><path d="M4 21v-1a6 6 0 016-6h4a6 6 0 016 6v1"/></svg>
  </div>
  <div class="who">
    <b>Toughjobs Assistant</b>
    <span>Online · typically replies instantly</span>
  </div>
  <a href="tel:3099289080" class="call"><b>(309) 928-9080</b><small>Call the shop</small></a>
</header>

<div class="stream" id="stream">
  <div class="stream-in" id="streamIn"></div>
</div>

<div class="chips" id="chips"></div>

<a href="javascript:void(0)" class="leave-fab" id="leaveChat" aria-label="Close chat and return to the site">
  <span class="lf-ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>
  <span class="lf-txt"><b>Close Chat</b><small>Back to the site</small></span>
</a>

<div class="composer">
  <div class="composer-in">
    <textarea id="input" rows="1" placeholder="Ask about websites, SEO, pricing, timelines…"></textarea>
    <button class="send" id="send" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
  <div class="disc">AI assistant for Toughjobs. For a custom quote, <a href="contact.html">contact us</a> or call (309) 928-9080. Serving the Quad Cities &amp; Central Illinois.</div>
</div>

<script>
const SYSTEM = `You are the Toughjobs AI Assistant — a professional, welcoming, and knowledgeable web-design & digital-marketing support agent for Toughjobs, a marketing agency that builds websites, SEO, paid ads, and branding for home-service businesses (roofers, HVAC, plumbers, electricians, landscapers, and 20+ other trades).

## PERSONA & TONE
- Professional, welcoming, confident, and highly knowledgeable about web design, SEO, and lead generation for the trades.
- Clear, concise, plain-spoken. No jargon dumps. Talk like a helpful shop owner, not a corporate brochure.
- Empathetic and solution-oriented. The visitor is usually a busy home-service business owner who wants more calls and better jobs.
- Keep answers SHORT — 1 to 3 sentences whenever possible so they scan easily in a small chat window. Use a bold lead-in or a tight list only when it genuinely helps.

## CORE RESPONSIBILITIES
1. Answer FAQs about Toughjobs services, pricing, process, and timelines.
2. Point visitors to the right page using markdown links: [Services](services.html), [Portfolio](work.html), [About](about.html), [Free Tools](intake-landing.html), [Contact](contact.html).
3. Qualify leads gently — ask about their trade, service area, current website, and what's holding growth back. Then nudge them to book a call.

## SERVICES OFFERED
- Custom Websites — fast, mobile-first, conversion-focused sites built to turn visitors into phone calls.
- Local SEO & Google Business Profile — get found on Google Maps and "near me" searches.
- SEO — service pages and city pages that rank for the jobs you actually want.
- Paid Ads (Google / LSA) — high-intent leads, call tracking, tight local targeting.
- Branding & Logo — a professional look that lets you charge more.
- Vehicle & Fleet Wraps — rolling billboards.

## STARTUP PRICING (ZIP 61611 / East Peoria & Central Illinois — locally discounted because Toughjobs is newer to this market)
Frame these as honest, local, startup-friendly rates. Always say pricing is a starting point and a custom quote is free.
- Starter Website (up to 5 pages, mobile-first, lead forms): starts at $1,200 one-time (local market comparable is ~$3,000+).
- Growth Website (service pages + city/service-area pages, reviews, financing blocks): starts at $2,400.
- Local SEO + Google Business Profile management: $450/month.
- SEO (content + service/city pages): $650/month.
- Google Ads management: $400/month + your ad budget.
- Branding & Logo package: $600 one-time.
- Starter Growth Bundle (Starter Website + Local SEO + GBP setup): $1,800 up front, then $450/month.
- Vehicle wraps: custom quote (design + install).
No long-term contracts required on monthly services — month-to-month for local startups.

## TIMELINES
- Starter Website: about 2–4 weeks.
- Growth Website: about 4–6 weeks.
- SEO / Local SEO: setup in the first 2 weeks; meaningful ranking movement usually in 3–6 months.
- Paid Ads: live in about 1 week, optimized over the first 30 days.

## CONTACT
- Phone: (309) 928-9080
- Contact page: [Contact](contact.html)
- Free marketing tools & assessment: [Free Tools](intake-landing.html)

## GUARDRAILS
- NEVER invent pricing, packages, timelines, or guarantees not listed above. If asked something outside this knowledge base, say you're not certain and point them to [Contact](contact.html) or calling (309) 928-9080.
- Don't promise specific ranking positions or lead numbers — talk in ranges and "typically."
- Stay on topic: Toughjobs services, home-service marketing, and helping the visitor. Politely decline unrelated requests.
- Use markdown links (page.html) so they're clickable. Keep it under ~3 sentences.`;

const streamIn = document.getElementById('streamIn');
const stream = document.getElementById('stream');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const chipsEl = document.getElementById('chips');

const STARTERS = [
  "How much does a website cost?",
  "Why am I not getting calls from my site?",
  "Do you do SEO for my trade?",
  "How fast can I get a new site?"
];

let history = [];
let busy = false;

function mdToHtml(t){
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>')
    .replace(/\n/g,'<br>');
}

function addMsg(role, text){
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role==='me'?'me':'bot');
  if(role==='bot'){
    wrap.innerHTML = '<div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 2a5 5 0 015 5v1a5 5 0 01-10 0V7a5 5 0 015-5z"/><path d="M4 21v-1a6 6 0 016-6h4a6 6 0 016 6v1"/></svg></div><div class="bub">'+mdToHtml(text)+'</div>';
  } else {
    wrap.innerHTML = '<div class="bub"></div>';
    wrap.querySelector('.bub').textContent = text;
  }
  streamIn.appendChild(wrap);
  stream.scrollTop = stream.scrollHeight;
  return wrap;
}

function showTyping(){
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing';
  wrap.innerHTML = '<div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 2a5 5 0 015 5v1a5 5 0 01-10 0V7a5 5 0 015-5z"/><path d="M4 21v-1a6 6 0 016-6h4a6 6 0 016 6v1"/></svg></div><div class="bub"><div class="typing"><i></i><i></i><i></i></div></div>';
  streamIn.appendChild(wrap);
  stream.scrollTop = stream.scrollHeight;
}
function hideTyping(){ const t=document.getElementById('typing'); if(t) t.remove(); }

function renderChips(){
  chipsEl.innerHTML = '';
  if(history.length>0){ return; }
  STARTERS.forEach(s=>{
    const c=document.createElement('button');
    c.className='chip'; c.textContent=s;
    c.onclick=()=>{ input.value=s; send(); };
    chipsEl.appendChild(c);
  });
}

async function send(){
  const text = input.value.trim();
  if(!text || busy) return;
  busy = true; sendBtn.disabled = true;
  input.value=''; input.style.height='auto';
  chipsEl.innerHTML='';
  addMsg('me', text);
  history.push({role:'user', content:text});
  showTyping();
  try{
    const reply = await window.claude.complete({
      system: SYSTEM,
      messages: history,
      max_tokens: 500
    });
    hideTyping();
    const clean = (reply||'').trim() || "Sorry — I didn't catch that. Could you rephrase, or reach us at (309) 928-9080?";
    addMsg('bot', clean);
    history.push({role:'assistant', content:clean});
  }catch(e){
    hideTyping();
    addMsg('bot', "I'm having trouble responding right now. Please call us at (309) 928-9080 or use our [Contact](contact.html) page and we'll get right back to you.");
  }finally{
    busy=false; sendBtn.disabled=false; input.focus();
  }
}

document.getElementById('leaveChat').onclick = function(){
  if (document.referrer && document.referrer.indexOf(location.host) !== -1) {
    history.back();
  } else {
    location.href = 'index.html';
  }
};

sendBtn.onclick = send;
input.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});
input.addEventListener('input', ()=>{
  input.style.height='auto';
  input.style.height = Math.min(input.scrollHeight,120)+'px';
});

// greeting
addMsg('bot', "Hey there — I'm the **Toughjobs Assistant**. I help home-service pros like you get more calls with better websites, SEO, and ads. What trade are you in, and what's holding your growth back?");
renderChips();
input.focus();
</script>
</body>
</html>
